# ── Server ────────────────────────────────────────────────────────────────────
# ${PORT:9098} means: use env var PORT if set, otherwise default to 9098
# In Docker/K8s: -e PORT=9098 or a ConfigMap key PORT=9098
# Locally: no env var set → falls back to 9098 automatically
server.port=${PORT:9098}

# ── Database ──────────────────────────────────────────────────────────────────
# DB_PATH env var lets us point to a different file location in Docker/K8s
# Default ./notesbuddy-db works perfectly for local Maven runs
spring.datasource.url=jdbc:h2:file:${DB_PATH:./notesbuddy-db}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# H2 console — useful for debugging locally, disable in production
spring.h2.console.enabled=${H2_CONSOLE:true}

# ── Actuator ──────────────────────────────────────────────────────────────────
# Exposes /actuator/health — Kubernetes uses this for liveness + readiness probes
# Without this K8s doesn't know if the pod is alive or ready to serve traffic
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
