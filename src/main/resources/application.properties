# ── Server ────────────────────────────────────────────────────────────────────
# ${PORT:9098} means: use env var PORT if set, otherwise default to 9098
# In Docker/K8s: -e PORT=9098 or a ConfigMap key PORT=9098
# Locally: no env var set → falls back to 9098 automatically
server.port=${PORT:9098}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:notesbuddy}
spring.datasource.username=${DB_USER:notesbuddy}
spring.datasource.password=${DB_PASS:notesbuddy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Actuator + Prometheus ─────────────────────────────────────────────────────
# health → K8s liveness/readiness probes
# prometheus → Prometheus scrapes this endpoint for metrics
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
