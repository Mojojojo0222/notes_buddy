<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes Buddy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        .header { margin-bottom: 28px; }
        .header h1 { color: #4ec9b0; font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
        .header p  { color: #484f58; font-size: 0.8rem; margin-top: 4px; }

        /* ── Summary ── */
        .summary-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 24px;
        }
        .summary-box h2 {
            color: #4ec9b0;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 12px 14px;
        }
        .stat-label { color: #484f58; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-value { color: #e6edf3; font-size: 1rem; }
        .topics     { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
        .topic-tag  { background: #1f3a2e; color: #4ec9b0; border: 1px solid #2ea04326; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; }

        /* ── Search + Filters ── */
        .search-wrap { position: relative; margin-bottom: 12px; }
        .search-wrap input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-wrap input:focus { border-color: #4ec9b0; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #484f58; font-size: 0.85rem; pointer-events: none; }

        .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
        .filter-btn {
            background: #161b22;
            border: 1px solid #30363d;
            color: #484f58;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 3px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover  { border-color: #4ec9b0; color: #4ec9b0; }
        .filter-btn.active { background: #1f3a2e; border-color: #4ec9b0; color: #4ec9b0; }

        /* ── Session Card ── */
        .session-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid #21262d;
            transition: background 0.15s;
        }
        .session-header:hover { background: #1c2128; }

        .session-left { display: flex; flex-direction: column; gap: 6px; }

        .session-time {
            color: #e6edf3;
            font-size: 0.85rem;
        }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .session-stat {
            color: #484f58;
            font-size: 0.72rem;
        }

        .session-cats { display: flex; gap: 5px; flex-wrap: wrap; }

        .session-toggle {
            color: #484f58;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        .session-toggle.open { transform: rotate(180deg); }

        /* ── Command Row ── */
        .session-commands { display: none; }
        .session-commands.open { display: block; }

        .command-row {
            display: grid;
            grid-template-columns: 52px 1fr;
            gap: 0 16px;
            padding: 9px 18px;
            border-bottom: 1px solid #0d1117;
        }
        .command-row:last-child { border-bottom: none; }
        .command-row:hover { background: #1c2128; }

        .time { color: #484f58; font-size: 0.78rem; padding-top: 2px; white-space: nowrap; }

        .command-body  { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .command-main  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .cmd-text      { color: #79c0ff; font-size: 0.88rem; word-break: break-all; }

        .cat-badge      { font-size: 0.65rem; padding: 1px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .cat-git        { background: #1a2e1a; color: #56d364; border: 1px solid #2ea04326; }
        .cat-docker     { background: #0d2137; color: #58a6ff; border: 1px solid #1f6feb26; }
        .cat-kubernetes { background: #1a1a2e; color: #a5a0ff; border: 1px solid #6e40c926; }
        .cat-terraform  { background: #2e1a2e; color: #d2a8ff; border: 1px solid #8957e526; }
        .cat-build      { background: #2e2a0d; color: #e3b341; border: 1px solid #9e6a0326; }
        .cat-files      { background: #1a1a1a; color: #8b949e; border: 1px solid #30363d; }
        .cat-network    { background: #2e1a1a; color: #ffa198; border: 1px solid #da363326; }
        .cat-editor     { background: #1a2a2e; color: #76e3ea; border: 1px solid #1b7c8326; }
        .cat-other      { background: #1a1a1a; color: #6e7681; border: 1px solid #21262d; }

        .exit-code      { font-size: 0.72rem; padding: 1px 6px; border-radius: 4px; font-weight: bold; }
        .exit-code.ok   { color: #3fb950; border: 1px solid #2ea04340; }
        .exit-code.fail { color: #f85149; border: 1px solid #f8514940; }

        .tag-wrap { display: inline-flex; align-items: center; gap: 4px; }
        .tag-badge {
            background: #1c2541; color: #a5d6ff; border: 1px solid #58a6ff40;
            font-size: 0.65rem; padding: 1px 7px; border-radius: 10px; white-space: nowrap;
            cursor: pointer; transition: all 0.15s;
        }
        .tag-badge:hover { background: #2a3a5e; }
        .tag-input {
            background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
            font-family: 'Courier New', monospace; font-size: 0.72rem;
            padding: 1px 6px; border-radius: 4px; width: 100px; outline: none;
        }
        .tag-input:focus { border-color: #4ec9b0; }

        .meta-row  { display: flex; gap: 14px; flex-wrap: wrap; }
        .meta-item { color: #484f58; font-size: 0.72rem; display: flex; align-items: center; gap: 4px; }
        .meta-item span { color: #6e7681; }

        /* ── Timeline ── */
        .timeline-bar {
            display: flex; align-items: center; gap: 12px;
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 12px 18px; margin-bottom: 16px;
        }
        .timeline-bar label { color: #484f58; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .timeline-bar input[type=date] {
            background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
            font-family: 'Courier New', monospace; font-size: 0.85rem;
            padding: 6px 10px; border-radius: 6px; outline: none;
        }
        .timeline-bar input[type=date]:focus { border-color: #4ec9b0; }
        .timeline-bar .nav-btn {
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
            font-family: 'Courier New', monospace; font-size: 0.85rem;
            padding: 4px 12px; border-radius: 6px; cursor: pointer;
        }
        .timeline-bar .nav-btn:hover { border-color: #4ec9b0; color: #4ec9b0; }
        .timeline-bar .nav-btn:disabled { opacity: 0.4; cursor: default; border-color: #30363d; color: #484f58; }

        .weekly-section {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 18px 22px; margin-bottom: 24px;
        }
        .weekly-section h2 {
            color: #4ec9b0; font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 16px;
        }

        .empty { color: #484f58; text-align: center; padding: 60px 0; font-size: 0.85rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚡ Notes Buddy</h1>
    <p>your engineering journal — every command, every directory, every repo</p>
</div>

<div class="summary-box">
    <h2>Today's Summary</h2>
    <div class="summary-grid">
        <div class="stat">
            <div class="stat-label">Commands Run</div>
            <div class="stat-value" id="totalCommands">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Sessions</div>
            <div class="stat-value" id="totalSessions">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Most Used</div>
            <div class="stat-value" id="mostUsed">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Topics Touched</div>
            <div class="topics" id="topics"></div>
        </div>
    </div>
</div>

<div class="weekly-section">
    <h2>This Week</h2>
    <div class="summary-grid">
        <div class="stat">
            <div class="stat-label">Commands Run</div>
            <div class="stat-value" id="weeklyTotal">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Most Used</div>
            <div class="stat-value" id="weeklyMostUsed">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Errors Found</div>
            <div class="stat-value" id="weeklyErrors">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Categories</div>
            <div class="topics" id="weeklyTopics"></div>
        </div>
    </div>
</div>

<div class="timeline-bar">
    <label>📅 Timeline</label>
    <button class="nav-btn" id="dayPrev" onclick="shiftDay(-1)">‹ Prev</button>
    <input type="date" id="datePicker" onchange="loadDate()" />
    <button class="nav-btn" id="dayNext" onclick="shiftDay(1)">Next ›</button>
    <button class="nav-btn" onclick="clearSearch(); selectedDate=new Date().toLocaleDateString('en-CA'); load();">Today</button>
    <button class="nav-btn" onclick="clearSearch(); selectedDate=''; load();">All</button>
</div>

<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search all commands (server-side)..." oninput="onSearchInput()" />
</div>

<div class="filters" id="filters"></div>

<div id="output"></div>

<script>
    let allSessions = [];
    let allCommands = [];
    let activeFilters = new Set();
    let selectedDate = '';
    let searchQuery = '';
    let searchTimer = null;

    loadFilters();

    async function load() {
        const searchBox = document.getElementById('search');
        const datePicker = document.getElementById('datePicker');

        const [sumRes, weeklyRes] = await Promise.all([
            fetch('/summary'), fetch('/summary/weekly')
        ]);
        const summary = await sumRes.json();

        document.getElementById('totalCommands').textContent = summary.totalCommands;
        document.getElementById('mostUsed').textContent      = summary.mostUsed;

        const today = new Date().toLocaleDateString('en-CA');

        // weekly summary
        try {
            const weekly = await weeklyRes.json();
            document.getElementById('weeklyTotal').textContent    = weekly.totalCommands;
            document.getElementById('weeklyMostUsed').textContent = weekly.mostUsed;
            document.getElementById('weeklyErrors').textContent   = weekly.errorCount;
            const wtEl = document.getElementById('weeklyTopics');
            wtEl.innerHTML = weekly.topicsTouched.length
                ? weekly.topicsTouched.map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('')
                : '<span style="color:#484f58">—</span>';
        } catch(e) { /* weekly endpoint not available */ }

        // server-side search mode
        if (searchQuery) {
            const searchRes = await fetch(`/commands/search?q=${encodeURIComponent(searchQuery)}`);
            const cmds = await searchRes.json();
            // Group by date so we get day cards instead of a flat list
            const byDate = {};
            for (const c of cmds) {
                const d = new Date(c.savedAt).toLocaleDateString('en-CA');
                if (!byDate[d]) byDate[d] = { date: d, commands: [] };
                byDate[d].commands.push(c);
            }
            allSessions = Object.values(byDate).map(group => ({
                startTime: group.commands[0].savedAt,
                endTime: group.commands[group.commands.length-1].savedAt,
                durationMins: 0,
                commandCount: group.commands.length,
                categories: [...new Set(group.commands.map(c => c.category).filter(Boolean))],
                commands: group.commands
            }));
            document.getElementById('totalSessions').textContent = '—';
            buildFilterButtons();
            applyFilters();
            return;
        }

        // if a date is selected, show that date; otherwise show sessions
        if (selectedDate) {
            datePicker.value = selectedDate;
            const sessRes = await fetch(`/commands/by-date?date=${selectedDate}`);
            const cmds = await sessRes.json();
            allSessions = cmds.length > 0 ? [{
                startTime: cmds[0].savedAt,
                endTime: cmds[cmds.length-1].savedAt,
                durationMins: 0,
                commandCount: cmds.length,
                categories: [...new Set(cmds.map(c => c.category).filter(Boolean))],
                commands: cmds
            }] : [];

            const todaySessions = allSessions.filter(s =>
                new Date(s.startTime).toLocaleDateString('en-CA') === today
            );
            document.getElementById('totalSessions').textContent = todaySessions.length;
        } else {
            datePicker.value = today;
            const sessRes = await fetch('/sessions');
            allSessions = await sessRes.json();
            const todaySessions = allSessions.filter(s =>
                new Date(s.startTime).toLocaleDateString('en-CA') === today
            );
            document.getElementById('totalSessions').textContent = todaySessions.length;
        }

        // flatten all commands for filter buttons
        allCommands = [];
        allSessions.forEach(s => (s.commands || []).forEach(c => allCommands.push(c)));

        const topicsEl = document.getElementById('topics');
        topicsEl.innerHTML = summary.topicsTouched.length
            ? summary.topicsTouched.map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('')
            : '<span style="color:#484f58">none yet</span>';

        buildFilterButtons();
        applyFilters();
    }

    // ── Server-Side Search ──
    function onSearchInput() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const val = document.getElementById('search').value.trim();
            if (val.length >= 2) {
                searchQuery = val;
                selectedDate = '';  // clear date filter when searching
                load();
            } else if (val.length === 0) {
                searchQuery = '';
                load();
            }
        }, 300);
    }

    // ── Filters + localStorage ──
    function saveFilters() {
        localStorage.setItem('notesBuddyFilters', JSON.stringify([...activeFilters]));
    }
    function loadFilters() {
        try {
            const saved = JSON.parse(localStorage.getItem('notesBuddyFilters'));
            if (saved && Array.isArray(saved)) activeFilters = new Set(saved);
        } catch(e) {}
    }

    function buildFilterButtons() {
        const cats = new Set();
        allSessions.forEach(s => (s.categories || []).forEach(c => cats.add(c)));
        const sorted = [...cats].sort();

        const filtersEl = document.getElementById('filters');
        const clearBtn  = `<button class="filter-btn ${activeFilters.size === 0 ? 'active' : ''}" onclick="clearFilters()">all</button>`;
        const catBtns   = sorted.map(cat =>
            `<button class="filter-btn ${activeFilters.has(cat) ? 'active' : ''}" onclick="toggleFilter('${cat}')">${cat}</button>`
        ).join('');
        filtersEl.innerHTML = clearBtn + catBtns;
    }

    function clearFilters()       { activeFilters.clear(); saveFilters(); buildFilterButtons(); applyFilters(); }
    function toggleFilter(cat)    { activeFilters.has(cat) ? activeFilters.delete(cat) : activeFilters.add(cat); saveFilters(); buildFilterButtons(); applyFilters(); }

    function applyFilters() {
        const query = document.getElementById('search').value.toLowerCase();

        const filtered = allSessions.map(session => {
            const cmds = session.commands.filter(c => {
                const matchSearch = query === '' ||
                    c.text.toLowerCase().includes(query) ||
                    (c.tag && c.tag.toLowerCase().includes(query));
                const matchCat    = activeFilters.size === 0 || activeFilters.has(c.category);
                return matchSearch && matchCat;
            });
            return { ...session, commands: cmds };
        }).filter(s => s.commands.length > 0);

        render(filtered);
    }

    // ── Search Clear ──
    function clearSearch() {
        searchQuery = '';
        document.getElementById('search').value = '';
    }

    // ── Timeline ──
    function loadDate() {
        clearSearch();
        const picker = document.getElementById('datePicker');
        if (!picker.value) return;
        selectedDate = picker.value;
        load();
    }

    function shiftDay(delta) {
        const picker = document.getElementById('datePicker');
        const d = picker.valueAsDate || new Date();
        d.setDate(d.getDate() + delta);
        picker.valueAsDate = d;
        loadDate();
    }

    // ── Tag editing ──
    function startTagEdit(cmdId) {
        const span = document.getElementById(`tag-${cmdId}`);
        const current = span.textContent === '+' ? '' : span.textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'tag-input';
        input.value = current;
        input.placeholder = 'add tag...';
        input.onblur = () => saveTag(cmdId, input.value);
        input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { span.style.display=''; input.remove(); } };
        span.style.display = 'none';
        span.parentNode.insertBefore(input, span.nextSibling);
        input.focus();
    }

    function saveTag(cmdId, tag) {
        tag = tag.trim();
        fetch(`/commands/${cmdId}/tag?tag=${encodeURIComponent(tag)}`, { method: 'POST' })
            .then(() => load());
    }

    // ── Render ──
    function render(sessions) {
        const output = document.getElementById('output');

        if (sessions.length === 0) {
            output.innerHTML = '<div class="empty">no commands found</div>';
            return;
        }

        let html = '';
        sessions.forEach((session, idx) => {
            const start    = new Date(session.startTime);
            const end      = new Date(session.endTime);
            const startStr = fmt(start);
            const endStr   = fmt(end);
            const dur      = formatDuration(session.durationMins);
            const dateStr  = start.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

            const catBadges = (session.categories || [])
                .map(c => `<span class="cat-badge cat-${c}">${c}</span>`).join('');

            const isTimeline = !session.commandCount; // loaded via date picker, no pre-computed values
            const cmdCount = session.commandCount || session.commands.length;

            html += `
            <div class="session-card">
                <div class="session-header" onclick="toggleSession(${idx})">
                    <div class="session-left">
                        <div class="session-time">${dateStr} &nbsp;·&nbsp; ${startStr} → ${endStr} ${!isTimeline ? '·&nbsp; '+dur : ''}</div>
                        <div class="session-meta">
                            <span class="session-stat">${cmdCount} commands</span>
                            <div class="session-cats">${catBadges}</div>
                        </div>
                    </div>
                    <span class="session-toggle" id="toggle-${idx}">▼</span>
                </div>
                <div class="session-commands" id="cmds-${idx}">`;

            for (const cmd of session.commands) {
                const t     = fmt(new Date(cmd.savedAt));
                const cat   = cmd.category || 'other';
                const badge = `<span class="cat-badge cat-${cat}">${cat}</span>`;

                const ec = cmd.exitCode !== null && cmd.exitCode !== undefined
                    ? `<span class="exit-code ${cmd.exitCode === 0 ? 'ok' : 'fail'}">${cmd.exitCode === 0 ? '✓' : '✗ '+cmd.exitCode}</span>`
                    : '';

                const tagHtml = `<span class="tag-wrap">
                    <span class="tag-badge" id="tag-${cmd.id}" onclick="startTagEdit(${cmd.id})">${cmd.tag ? escapeHtml(cmd.tag) : '+'}</span>
                </span>`;

                const dirPart  = cmd.workingDir && cmd.workingDir !== 'unknown'
                    ? `<span class="meta-item">📁 <span>${escapeHtml(cmd.workingDir)}</span></span>` : '';
                const repoPart = cmd.repoName && cmd.repoName !== 'none'
                    ? `<span class="meta-item">🔀 <span>${escapeHtml(cmd.repoName)}</span></span>` : '';
                const metaRow  = (dirPart || repoPart) ? `<div class="meta-row">${dirPart}${repoPart}${tagHtml}</div>` : '';

                html += `
                <div class="command-row">
                    <span class="time">${t}</span>
                    <div class="command-body">
                        <div class="command-main">
                            <span class="cmd-text">${escapeHtml(cmd.text)}</span>
                            ${badge} ${ec}
                        </div>
                        ${metaRow}
                    </div>
                </div>`;
            }

            html += `</div></div>`;
        });

        output.innerHTML = html;

        toggleSession(0);
    }

    function toggleSession(idx) {
        const cmds   = document.getElementById(`cmds-${idx}`);
        const toggle = document.getElementById(`toggle-${idx}`);
        if (!cmds) return;
        cmds.classList.toggle('open');
        toggle.classList.toggle('open');
    }

    function fmt(date) {
        return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatDuration(mins) {
        if (mins < 1)  return '< 1 min';
        if (mins < 60) return `${mins}m`;
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function escapeHtml(text) {
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    load();
    setInterval(load, 15000);
</script>

</body>
</html>
